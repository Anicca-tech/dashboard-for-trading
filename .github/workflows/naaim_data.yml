name: Fetch NAAIM Data

on:
  schedule:
    # Every Thursday at 23:00 UTC (6pm EST) — after weekly publish
    - cron: "0 23 * * 4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch NAAIM data
        run: python scripts/fetch_naaim.py

      - name: Commit data file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/naaim.json
          git diff --cached --quiet || git commit -m "chore: refresh NAAIM data [skip ci]"
          git push
