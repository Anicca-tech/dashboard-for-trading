name: Macro Economic Data

on:
  schedule:
    - cron: '35 14 * * 1-5'   # 10:35 AM ET Mon–Fri (catches morning releases)
    - cron: '35 19 * * 1-5'   # 3:35 PM ET Mon–Fri (catch afternoon updates)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python scripts/fetch_macro.py

      - name: Commit macro data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/macro.json
          git diff --cached --quiet || git commit -m "chore: update macro data [skip ci]"
          git pull --rebase
          git push
