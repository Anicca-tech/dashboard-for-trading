name: IPO Weekly Briefing

on:
  schedule:
    - cron: '0 10 * * 0'   # 10:00 UTC (6:00 AM ET) every Sunday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests yfinance pytz

      - name: Run script
        run: python scripts/fetch_ipo.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ipo_briefing.json
          git diff --cached --quiet || git commit -m "chore: update ipo_briefing.json [skip ci]"
          git push
