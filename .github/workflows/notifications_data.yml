name: Intraday Notifications

on:
  schedule:
    - cron: '5 14 * * 1-5'   # 10:05 AM ET (14:05 UTC) Mon–Fri
    - cron: '35 16 * * 1-5'  # 12:35 PM ET (16:35 UTC) Mon–Fri
    - cron: '35 19 * * 1-5'  # 3:35 PM ET (19:35 UTC) Mon–Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests yfinance pytz

      - name: Run script
        run: python scripts/fetch_notifications.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notifications.json
          git diff --cached --quiet || git commit -m "chore: update notifications.json [skip ci]"
          git push
