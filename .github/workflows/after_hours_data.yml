name: After-Hours Movers

on:
  schedule:
    - cron: '5 21 * * 1-5'   # 5:05 PM ET (21:05 UTC) Mon–Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests pytz

      - name: Run script
        run: python scripts/fetch_after_hours.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/after_hours.json
          git diff --cached --quiet || git commit -m "chore: update after_hours.json [skip ci]"
          git pull --rebase
          git push
