name: Fetch Earnings Calendar

on:
  schedule:
    # 06:00 UTC Mon–Fri — before US market open, covers the full week ahead
    - cron: "0 6 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch earnings calendar
        run: python scripts/fetch_earnings.py

      - name: Commit data file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/earnings.json
          git diff --cached --quiet || git commit -m "chore: update earnings calendar [skip ci]"
          git pull --rebase
          git push
